[project]
name = "seqconvnet-preprocess"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "seqconvnet-core", 
    "virid-core>=0.1.5",
    "virid-std>=0.1.5",
]

[tool.hatch.build.targets.wheel]
packages = ["src/seqconvnet"]
layout = "src"           # 核心：使用标准的 src 布局逻辑

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
seqconvnet-core= { workspace = true }