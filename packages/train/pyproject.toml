[project]
name = "seqconvnet-train"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "seqconvnet-core", 
    "virid-core>=0.1.6",
    "virid-std>=0.1.6",
]
[tool.hatch.build.targets.wheel]
packages = ["src/seqconvnet"]
layout = "src"


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"


[tool.uv.sources]
seqconvnet-core= { workspace = true }

